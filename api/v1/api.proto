syntax = "proto3";

package api.v1;

option go_package = "bcc-media-tools/api/v1;apiv1";

import "google/protobuf/timestamp.proto";
import "api/v1/common.proto";

message BMMPermission {
	repeated string languages = 1;
	repeated string albums = 2;
	repeated string podcasts = 3;
	bool admin = 4;
  bool integration = 5;
}

message TranscriptionPermission {
  bool admin = 1;
  bool mediabanken = 2;
}

message ExportPermission {
  // destinations the user is allowed to export to (xdcam, vod, bmm, bmm-integration, isilon)
  repeated string destinations = 1;
  // admin can export to all destinations
  bool admin = 2;
  // can trigger the (VOD-affecting) timed metadata export
  bool timed_metadata = 3;
  // can paste a list of VX-ids and export them in bulk (without opening an asset)
  bool bulk_export = 4;
}

message VBExportPermission {
  // destinations the user is allowed to export to (abekas, raw-abekas, b-stage, gfx, hippo_v2, hippo_hap, dubbing, hyperdeck, xdcam, caspar-cg)
  repeated string destinations = 1;
  // admin can export to all destinations
  bool admin = 2;
  // can paste a list of VX-ids and VB-export them in bulk (without opening an asset)
  bool bulk_export = 3;
}

// Permissions for the Cantemo action panel (the workflow-trigger chips).
// The two export chips reuse ExportPermission / VBExportPermission.
message CantemoPermission {
  // can trigger preview generation ("Make preview")
  bool preview = 1;
  // can trigger transcription ("Transcribe")
  bool transcribe = 2;
  // can update subtitles from Subtrans ("Update subtitle from Subtrans")
  bool subtitles = 3;
  // can update asset relations ("Update asset relations")
  bool relations = 4;
}

// Permission for the VAULT search view.
message VaultPermission {
  // can search the vault and view items
  bool enabled = 1;
}

message Permissions {
	bool admin = 1;
	BMMPermission bmm = 2;
  string email = 3;
  TranscriptionPermission transcription = 4;
  ExportPermission export = 5;
  VBExportPermission vb_export = 6;
  CantemoPermission cantemo = 7;
  VaultPermission vault = 8;
}

message GetPermissionsRequest {}

message SetPermissionsRequest {
	string email = 1;
	Permissions permissions = 2;
}

message DeletePermissionsRequest {
	string email = 1;
}

message PermissionsList {
	map<string, Permissions> permissions = 1;
}

message BMMYear {
	uint32 year = 1;
	uint32 count = 2;
}

message GetYearsResponse {
	map<uint32, BMMYear> data = 1;
}

enum BmmEnvironment {
	Production = 0;
	Integration = 1;
}

message GetYearsRequest {
	BmmEnvironment environment = 1;
}

message GetAlbumsRequest {
	uint32 year = 1;
	BmmEnvironment environment = 2;
}

message Album {
	string id = 1;
	string title = 2;
	string cover = 4;
	repeated string languages = 5;
}

message AlbumsList {
	repeated Album albums = 1;
}

message GetAlbumTracksRequest {
	string album_id = 1;
	BmmEnvironment environment = 2;
}

message GetPodcastTracksRequest {
	string podcast_tag = 1;
	uint32 limit = 2;
	BmmEnvironment environment = 3;
}

message GetAvailableLanguagesRequest {
  BmmEnvironment environment = 1;
}

message BMMTrack {
	string id = 1;
	string title = 2;
  google.protobuf.Timestamp publishedAt = 3;
  LanguageList languages = 4;
  LanguageList transcriptions = 5;
  bool hasTranscriptions = 6;
}

message TracksList {
	repeated BMMTrack tracks = 1;
}

message LanguageList {
  repeated Language Languages = 1;
}

message Language {
  string code = 1;
  string icon_file = 3;
}

message GetTranscriptionReqest {
  string VXID = 1;
}

message Transcription {
  string text = 1;
  repeated Segments segments = 2;
}

message Segments {
  double id = 1;
  int32 seek = 2;
  double start = 3;
  double end = 4;
  string text = 5;
  repeated int32 tokens = 6;
  double temperature = 7;
  double avg_logprob = 8;
  double compression_ratio = 9;
  double no_speech_prob = 10;
  double confidence = 11;
  repeated Words words = 12;
}

message Words {
  string text = 1;
  double start = 2;
  double end = 3;
  double confidence = 4;
}

message GetPreviewRequest {
  string VXID = 1;
}

message Preview{
  string url = 1;
}

message GetBMMTranscriptionRequest {
  string bmm_id = 1;
  string language = 2;
  BmmEnvironment environment = 3;
}

message SubmitTranscriptionRequest {
  string VXID = 1;
  Transcription transcription = 2;
}

message SubmitShortRequest {
  string VXID = 1;
  double InSeconds = 2;
  double OutSeconds = 3;
}

// ---- Export ----

message ExportResolution {
  int32 width = 1;
  int32 height = 2;
}

message ExportLanguage {
  string code = 1; // value sent back in StartExportRequest.languages
  string name = 2;
  bool mu1 = 3;
  bool mu2 = 4;
}

message ExportSubclip {
  string title = 1;
}

message GetExportConfigRequest {
  string VXID = 1;
}

message GetExportConfigResponse {
  string VXID = 1;
  string title = 2;
  // destinations filtered to what this user is allowed to export to
  repeated string destinations = 3;
  // audio sources (embedded / related)
  repeated string audio_sources = 4;
  string selected_audio_source = 5;
  repeated ExportLanguage languages = 6;
  repeated string selected_languages = 7;
  repeated ExportResolution resolutions = 8;
  // overlay file names, including "None"
  repeated string overlays = 9;
  repeated ExportSubclip subclips = 10;
  // whether this user may trigger the timed metadata export
  bool can_export_timed_metadata = 11;
}

message ExportResolutionSelection {
  int32 width = 1;
  int32 height = 2;
  bool downloadable = 3;
}

message StartExportRequest {
  string VXID = 1;
  repeated string destinations = 2;
  string audio_source = 3;
  repeated string languages = 4;
  repeated ExportResolutionSelection resolutions = 5;
  // overlay file name; "" or "None" means no watermark
  string overlay = 6;
  bool with_chapters = 7;
  bool ignore_silence = 8;
  bool export_ai_subs = 9;
  // subclip titles to export; empty means export the whole asset
  repeated string subclips = 10;
}

message StartExportResponse {
  repeated string workflow_ids = 1;
}

message ExportTimedMetadataRequest {
  string VXID = 1;
}

// ---- VB Export ----

message GetVBExportConfigRequest {
  string VXID = 1;
}

message GetVBExportConfigResponse {
  string VXID = 1;
  string title = 2;
  // destinations filtered to what this user is allowed to export to
  repeated string destinations = 3;
  // subtitle shape tags available on the asset (for burn-in)
  repeated string subtitle_shapes = 4;
  // available subtitle burn-in style files
  repeated string subtitle_styles = 5;
}

message StartVBExportRequest {
  string VXID = 1;
  repeated string destinations = 2;
  // subtitle shape tag to burn in; "" or "None" means no subtitles
  string subtitle_shape = 3;
  string subtitle_style = 4;
}

message StartVBExportResponse {
  string workflow_id = 1;
}

// Canonical, full destination lists (every selectable value), used by the admin
// permission editor so it never offers destinations the backend doesn't accept.
message ExportDestinationsResponse {
  repeated string vx = 1;
  repeated string vb = 2;
}

// Resolve a list of VX-ids to their titles for the bulk-export asset list.
message ResolveAssetsRequest {
  repeated string VXIDs = 1;
}

message ResolvedAsset {
  string VXID = 1;
  string title = 2;
  // false if the asset metadata could not be fetched (unknown / inaccessible id)
  bool found = 3;
}

message ResolveAssetsResponse {
  repeated ResolvedAsset assets = 1;
}

// ---- Cantemo action panel ----

enum CantemoAction {
  CANTEMO_ACTION_UNSPECIFIED = 0;
  CANTEMO_ACTION_PREVIEW = 1;
  CANTEMO_ACTION_TRANSCRIBE = 2;
  CANTEMO_ACTION_SUBTITLE_FROM_SUBTRANS = 3;
  CANTEMO_ACTION_UPDATE_RELATIONS = 4;
}

message TriggerCantemoActionRequest {
  string VXID = 1;
  CantemoAction action = 2;
}

// ---- VAULT (Vidispine search) ----

message VaultSearchRequest {
  // free-text query, matched against item titles
  string query = 1;
  // optional media-type filter (video / audio / image / other)
  repeated string media_types = 2;
  // 1-based page number; the page size is fixed server-side (~50)
  int32 page = 3;
}

message VaultItem {
  string VXID = 1;
  string title = 2;
  // video / audio / image / other
  string media_type = 3;
  // human-readable upload/created date
  string added = 4;
  // original file format / container (e.g. mov, wav, jpg)
  string format = 5;
  // human-readable file size (only populated for the detail view)
  string size = 6;
  // duration in seconds (0 for stills / documents)
  int32 duration_seconds = 7;
  // whether a playable preview shape exists
  bool has_preview = 8;
}

message VaultFacet {
  string media_type = 1;
  int32 count = 2;
}

message VaultSearchResponse {
  repeated VaultItem items = 1;
  int32 total_hits = 2;
  int32 page = 3;
  int32 page_size = 4;
  // per-media-type counts for the current query (for the filter sidebar)
  repeated VaultFacet facets = 5;
}

message GetVaultItemRequest {
  string VXID = 1;
}

message GetVaultItemResponse {
  VaultItem item = 1;
}

service APIService {
	// Permissions
	rpc GetPermissions (Void) returns (Permissions) {}
	rpc UpdatePermissions (SetPermissionsRequest) returns (Void) {}
	rpc DeletePermissions (DeletePermissionsRequest) returns (Void) {}
	rpc ListPermissions (Void) returns (PermissionsList) {}

  // Transcriptions
  rpc GetTranscription(GetTranscriptionReqest) returns (Transcription) {}
  rpc GetPreview(GetPreviewRequest) returns (Preview) {}
  rpc SubmitTranscription(SubmitTranscriptionRequest) returns (Void) {}

	// BMM
	rpc GetYears(GetYearsRequest) returns (GetYearsResponse) {}
	rpc GetAlbums(GetAlbumsRequest) returns (AlbumsList) {}
	rpc GetAlbumTracks(GetAlbumTracksRequest) returns (TracksList) {}
	rpc GetPodcastTracks(GetPodcastTracksRequest) returns (TracksList) {}
  rpc GetLanguages(GetAvailableLanguagesRequest) returns (LanguageList) {}
  rpc GetBMMTranscription(GetBMMTranscriptionRequest) returns (Transcription) {}

  // Shorts
  rpc SubmitShort(SubmitShortRequest) returns (Void) {}

  // Export
  rpc GetExportConfig(GetExportConfigRequest) returns (GetExportConfigResponse) {}
  rpc StartExport(StartExportRequest) returns (StartExportResponse) {}
  rpc ExportTimedMetadata(ExportTimedMetadataRequest) returns (Void) {}
  // Resolve VX-ids to titles for the bulk-export asset list
  rpc ResolveAssets(ResolveAssetsRequest) returns (ResolveAssetsResponse) {}

  // VB Export
  rpc GetVBExportConfig(GetVBExportConfigRequest) returns (GetVBExportConfigResponse) {}
  rpc StartVBExport(StartVBExportRequest) returns (StartVBExportResponse) {}

  // Full destination lists for the admin permission editor
  rpc GetExportDestinations(Void) returns (ExportDestinationsResponse) {}

  // Cantemo action panel
  rpc TriggerCantemoAction(TriggerCantemoActionRequest) returns (Void) {}

  // VAULT (Vidispine search)
  rpc VaultSearch(VaultSearchRequest) returns (VaultSearchResponse) {}
  rpc GetVaultItem(GetVaultItemRequest) returns (GetVaultItemResponse) {}
}
